<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status</title>
  <script src="config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080810;
      --surface:  #0f0f1a;
      --border:   #1e1e2e;
      --muted:    #3a3a50;
      --subtle:   #5a5a78;
      --body:     #b8b8cc;
      --bright:   #eeeef5;
      --green:    #3dffa0;
      --green-dim:#0d3322;
      --red:      #ff6b6b;
      --red-dim:  #2e1010;
      --amber:    #ffb347;
      --amber-dim:#2e1e08;
      --gray:     #6b6b88;
      --blue:     #7eb8ff;
      --blue-dim: #0d1e35;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--body);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
    }

    /* ── Top identity row ── */
    .identity {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .identity-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--subtle);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Status pill ── */
    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 11px 5px 8px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      font-weight: 500;
      color: var(--body);
      transition: border-color .3s, color .3s;
    }

    .pulse-wrap {
      position: relative;
      width: 8px;
      height: 8px;
      flex-shrink: 0;
    }

    .pulse-core {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .pulse-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      opacity: 0;
      animation: pulse-out 2.4s ease-out infinite;
    }

    @keyframes pulse-out {
      0%   { transform: scale(.6); opacity: .6; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    .state-available .pulse-core,
    .state-available .pulse-ring  { background: var(--green); }
    .state-available               { border-color: #1e3830; color: var(--green); }

    .state-busy .pulse-core,
    .state-busy .pulse-ring        { background: var(--red); }
    .state-busy                    { border-color: #3a1e1e; color: var(--red); }

    .state-dnd .pulse-core,
    .state-dnd .pulse-ring         { background: var(--amber); }
    .state-dnd                     { border-color: #3a2e10; color: var(--amber); }

    .state-away .pulse-core        { background: var(--gray); }
    .state-away .pulse-ring        { background: var(--gray); animation: none; }
    .state-away                    { color: var(--gray); }

    /* ── Current task block ── */
    .current-block {
      margin-bottom: 28px;
    }

    .current-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .current-task {
      font-size: 26px;
      font-weight: 300;
      color: var(--bright);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 6px;
      min-height: 32px;
    }

    .current-note {
      font-size: 13px;
      color: var(--subtle);
      font-style: italic;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* ── Schedule ── */
    .sched-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 7px 0;
      border-bottom: 1px solid #0e0e18;
      transition: opacity .2s;
    }

    .task-row:last-child { border-bottom: none; }
    .task-row.is-done    { opacity: .35; }
    .task-row.is-skipped { opacity: .25; }

    .task-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      min-width: 58px;
      flex-shrink: 0;
    }

    .task-name {
      flex: 1;
      font-size: 13px;
      color: var(--body);
    }

    .task-row.is-current .task-name { color: var(--bright); font-weight: 500; }

    .badge {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .badge-current  { background: var(--green-dim);  color: var(--green);  border: 1px solid #1a4432; }
    .badge-done     { background: var(--blue-dim);   color: var(--blue);   border: 1px solid #1a2e48; }
    .badge-skipped  { background: var(--red-dim);    color: var(--red);    border: 1px solid #3a1818; }
    .badge-upcoming { background: transparent;       color: var(--muted);  border: 1px solid var(--border); }

    /* ── Footer ── */
    .footer {
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .footer-offline { color: var(--red); }

    .refresh-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
      margin-right: 6px;
      transition: background .3s;
    }

    .refresh-dot.live { background: var(--green); }

    /* ── Loading skeleton ── */
    .skeleton {
      height: 14px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      margin-bottom: 8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    @media (prefers-reduced-motion: reduce) {
      .pulse-ring, .skeleton { animation: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="identity">
      <span class="identity-name">status.page</span>
      <div class="status-pill" id="status-pill">
        <div class="pulse-wrap">
          <div class="pulse-core" id="pulse-core"></div>
          <div class="pulse-ring" id="pulse-ring"></div>
        </div>
        <span id="status-text">—</span>
      </div>
    </div>

    <div class="current-block">
      <div class="current-label">right now</div>
      <div class="current-task" id="current-task">
        <div class="skeleton" style="width:55%;height:28px;border-radius:6px"></div>
      </div>
      <div class="current-note" id="current-note"></div>
    </div>

    <div class="divider"></div>

    <div class="sched-label">today</div>
    <div id="task-list">
      <div class="skeleton" style="width:100%"></div>
      <div class="skeleton" style="width:88%"></div>
      <div class="skeleton" style="width:92%"></div>
      <div class="skeleton" style="width:80%"></div>
    </div>

    <div class="footer">
      <span><span class="refresh-dot" id="refresh-dot"></span><span id="footer-time">loading</span></span>
      <span id="footer-status"></span>
    </div>
  </div>

  <script>
    const FETCH_MS = 15 * 60 * 1000;
    const STORAGE_KEY = 'status_cache_v2';
    const LAST_FETCH_KEY = 'status_last_fetch_v2';

    const statusMap = {
      'Available':       { cls: 'state-available', label: 'Available' },
      'Busy':            { cls: 'state-busy',      label: 'Busy' },
      'Do not disturb':  { cls: 'state-dnd',       label: 'Do not disturb' },
      'Away':            { cls: 'state-away',       label: 'Away' },
    };

    function getCache() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
    }
    function setCache(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      localStorage.setItem(LAST_FETCH_KEY, Date.now().toString());
    }
    function getLastFetch() {
      const v = localStorage.getItem(LAST_FETCH_KEY);
      return v ? parseInt(v, 10) : 0;
    }

    function render(data, offline) {
      const global = data.globalStatus || 'Away';
      const note   = data.note || '';
      const tasks  = data.tasks || [];
      const updated = data.lastUpdated ? new Date(data.lastUpdated) : new Date();

      // Status pill
      const pill   = document.getElementById('status-pill');
      const meta   = statusMap[global] || statusMap['Away'];
      pill.className = 'status-pill ' + meta.cls;
      document.getElementById('status-text').textContent = meta.label;

      // Find current task
      const currentTask = tasks.find(t => t.status === 'current');
      document.getElementById('current-task').textContent = currentTask ? currentTask.name : '—';
      const noteEl = document.getElementById('current-note');
      noteEl.textContent = note || '';

      // Task list
      const list = document.getElementById('task-list');
      list.innerHTML = '';
      for (const t of tasks) {
        const row = document.createElement('div');
        row.className = 'task-row' +
          (t.status === 'done'    ? ' is-done'    :
           t.status === 'skipped' ? ' is-skipped' :
           t.status === 'current' ? ' is-current' : '');

        const badge = t.status === 'current'  ? '<span class="badge badge-current">now</span>'  :
                      t.status === 'done'     ? '<span class="badge badge-done">done</span>'     :
                      t.status === 'skipped'  ? '<span class="badge badge-skipped">skip</span>'  :
                                                '<span class="badge badge-upcoming">—</span>';
        row.innerHTML = `
          <span class="task-time">${t.time}</span>
          <span class="task-name">${t.name}</span>
          ${badge}
        `;
        list.appendChild(row);
      }

      // Footer
      const dot = document.getElementById('refresh-dot');
      const footerTime = document.getElementById('footer-time');
      const footerStatus = document.getElementById('footer-status');
      const timeStr = updated.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      if (offline) {
        dot.classList.remove('live');
        footerTime.innerHTML = `<span class="footer-offline">offline</span> · ${timeStr}`;
        footerStatus.textContent = 'cached';
      } else {
        dot.classList.add('live');
        footerTime.textContent = timeStr;
        footerStatus.textContent = 'live';
      }
    }

    async function fetchStatus() {
      const base = (typeof API_URL !== 'undefined' ? API_URL : '');
      try {
        const res = await fetch(base + '/status', {
          cache: 'no-store',
          headers: { 'ngrok-skip-browser-warning': 'true' }
        });
        if (!res.ok) throw new Error('bad response');
        const data = await res.json();
        setCache(data);
        render(data, false);
      } catch {
        // GitHub raw fallback
        try {
          if (typeof GITHUB_RAW_URL !== 'undefined') {
            const r2 = await fetch(GITHUB_RAW_URL, { cache: 'no-store' });
            if (r2.ok) {
              const data = await r2.json();
              const today = new Date().toISOString().split('T')[0];
              if (data.date === today) { setCache(data); render(data, true); return; }
            }
          }
        } catch {}
        const cached = getCache();
        if (cached) {
          render(cached, true);
        } else {
          document.getElementById('current-task').textContent = 'unavailable';
          document.getElementById('footer-time').textContent = 'no data';
        }
      }
    }

    // Init
    const cached = getCache();
    if (cached) render(cached, true);
    fetchStatus();
    setInterval(fetchStatus, FETCH_MS);

    // Midnight reset
    const now = new Date();
    const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
    setTimeout(() => {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(LAST_FETCH_KEY);
      location.reload();
    }, next - now);
  </script>
</body>
</html>
